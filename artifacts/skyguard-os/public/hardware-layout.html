<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuard Box</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060d1a; }
svg { display:block; width:100%; max-width:720px; margin:0 auto; padding:10px; }
</style>
</head>
<body>
<svg viewBox="0 0 720 820" xmlns="http://www.w3.org/2000/svg">

  <!-- BG -->
  <rect width="720" height="820" fill="#060d1a" rx="12"/>

  <!-- TITLE -->
  <text x="360" y="32" fill="#4fc3f7" font-size="17" text-anchor="middle" font-weight="bold" letter-spacing="2">SKYGUARD BOX — ИЗГЛЕД ОТГОРЕ</text>
  <text x="360" y="50" fill="#546e7a" font-size="11" text-anchor="middle">Реални размери · само Pi 5 · 3D печат ASA</text>

  <!-- ══════════════════════════════════════════
       КУТИЯ: 240 × 160 mm вътрешни размери
       ════════════════════════════════════════ -->
  <!-- Scale: 1mm = 2.2px  →  240mm=528px, 160mm=352px -->

  <!-- Outer box -->
  <rect x="90" y="65" width="540" height="365" rx="14" fill="#0f1923" stroke="#37474f" stroke-width="3"/>
  <!-- Inner padding -->
  <rect x="100" y="75" width="520" height="345" rx="10" fill="#0d1520" stroke="#1a2940" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Dimension arrows -->
  <line x1="90" y1="58" x2="630" y2="58" stroke="#546e7a" stroke-width="1"/>
  <polygon points="90,55 95,58 90,61" fill="#546e7a"/>
  <polygon points="630,55 625,58 630,61" fill="#546e7a"/>
  <text x="360" y="55" fill="#546e7a" font-size="10" text-anchor="middle">240 mm</text>

  <line x1="83" y1="65" x2="83" y2="430" stroke="#546e7a" stroke-width="1"/>
  <polygon points="80,65 83,70 86,65" fill="#546e7a"/>
  <polygon points="80,430 83,425 86,430" fill="#546e7a"/>
  <text x="72" y="252" fill="#546e7a" font-size="10" text-anchor="middle" transform="rotate(-90 72 252)">160 mm</text>

  <!-- ══ RASPBERRY Pi 5 (85×56mm → 187×123px) ══ -->
  <rect x="108" y="83" width="187" height="123" rx="6" fill="#1a3d1e" stroke="#4caf50" stroke-width="2.5"/>
  <!-- PCB fill -->
  <rect x="112" y="87" width="179" height="115" rx="4" fill="#1e4620" opacity="0.5"/>
  <!-- BCM2712 CPU -->
  <rect x="130" y="105" width="60" height="60" rx="4" fill="#0d200f" stroke="#388e3c" stroke-width="2"/>
  <text x="160" y="133" fill="#81c784" font-size="9" text-anchor="middle" font-weight="bold">BCM2712</text>
  <text x="160" y="147" fill="#4caf50" font-size="8" text-anchor="middle">Cortex-A76</text>
  <text x="160" y="158" fill="#388e3c" font-size="7" text-anchor="middle">2.4GHz</text>
  <!-- RAM -->
  <rect x="200" y="105" width="50" height="32" rx="3" fill="#0d200f" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="225" y="120" fill="#81c784" font-size="8" text-anchor="middle">16GB</text>
  <text x="225" y="131" fill="#4caf50" font-size="7" text-anchor="middle">LPDDR4X</text>
  <!-- USB 3.0 ports (right edge of Pi) -->
  <rect x="274" y="88" width="16" height="14" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <rect x="274" y="105" width="16" height="14" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <!-- USB 2.0 -->
  <rect x="274" y="122" width="16" height="10" rx="2" fill="#0d47a1" stroke="#1976d2" stroke-width="1"/>
  <rect x="274" y="135" width="16" height="10" rx="2" fill="#0d47a1" stroke="#1976d2" stroke-width="1"/>
  <text x="285" y="155" fill="#42a5f5" font-size="7" text-anchor="middle">USB</text>
  <!-- Ethernet -->
  <rect x="274" y="160" width="16" height="14" rx="2" fill="#1a237e" stroke="#3f51b5" stroke-width="1.5"/>
  <text x="282" y="171" fill="#7986cb" font-size="6" text-anchor="middle">ETH</text>
  <!-- GPIO strip top -->
  <rect x="110" y="83" width="140" height="6" rx="1" fill="#2e7d32" opacity="0.8"/>
  <text x="180" y="89" fill="#a5d6a7" font-size="6" text-anchor="middle">GPIO 40-pin</text>

  <!-- Pi label -->
  <text x="200" y="100" fill="#66bb6a" font-size="12" text-anchor="middle" font-weight="bold">Raspberry Pi 5</text>
  <!-- No USB WiFi - built-in WiFi note -->
  <text x="155" y="180" fill="#388e3c" font-size="8" text-anchor="middle">WiFi 5 · BT 5.0 · вграден</text>
  <text x="155" y="190" fill="#2e7d32" font-size="7" text-anchor="middle">без USB WiFi!</text>

  <!-- NVMe HAT (под Pi, same footprint) - shown as overlay -->
  <rect x="108" y="210" width="187" height="60" rx="5" fill="#00332b" stroke="#00897b" stroke-width="2"/>
  <rect x="115" y="218" width="130" height="18" rx="3" fill="#003d33" stroke="#00695c" stroke-width="1.5"/>
  <!-- SSD chips -->
  <rect x="118" y="220" width="18" height="14" rx="2" fill="#004d40" stroke="#00897b" stroke-width="1"/>
  <rect x="140" y="220" width="18" height="14" rx="2" fill="#004d40" stroke="#00897b" stroke-width="1"/>
  <rect x="162" y="220" width="18" height="14" rx="2" fill="#004d40" stroke="#00897b" stroke-width="1"/>
  <rect x="184" y="220" width="18" height="14" rx="2" fill="#00695c" stroke="#00897b" stroke-width="1"/>
  <text x="200" y="232" fill="#4db6ac" font-size="9" text-anchor="middle" font-weight="bold">NVMe HAT + SSD 512GB</text>
  <text x="200" y="259" fill="#00897b" font-size="8" text-anchor="middle">PCIe 3.0 · под Pi 5</text>

  <!-- ══ nRF52840 USB DONGLE (45×18mm → 99×40px) ══ -->
  <rect x="108" y="285" width="99" height="40" rx="4" fill="#0d1b3e" stroke="#3f51b5" stroke-width="2"/>
  <!-- USB connector -->
  <rect x="108" y="295" width="18" height="20" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="117" y="308" fill="#90caf9" font-size="6" text-anchor="middle">USB</text>
  <!-- PCB -->
  <rect x="130" y="290" width="72" height="30" rx="3" fill="#131c4a"/>
  <!-- nRF chip -->
  <rect x="155" y="295" width="25" height="20" rx="2" fill="#1a237e" stroke="#3f51b5" stroke-width="1"/>
  <text x="167" y="307" fill="#7986cb" font-size="6" text-anchor="middle">nRF</text>
  <text x="167" y="314" fill="#5c6bc0" font-size="5" text-anchor="middle">52840</text>
  <!-- BLE antenna trace on PCB -->
  <path d="M 135 298 Q 140 293 145 298 Q 150 303 155 298" stroke="#3f51b5" stroke-width="1.5" fill="none"/>
  <text x="155" y="336" fill="#7986cb" font-size="9" text-anchor="middle">nRF52840 BLE</text>

  <!-- PoE HAT (same size as Pi, stacks on it - shown as small indicator) -->
  <rect x="108" y="338" width="187" height="30" rx="4" fill="#1a237e" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="200" y="350" fill="#7986cb" font-size="9" text-anchor="middle" font-weight="bold">PoE HAT for Pi 5</text>
  <text x="200" y="363" fill="#5c6bc0" font-size="8" text-anchor="middle">стека върху Pi · IEEE 802.3at · RJ45</text>

  <!-- ══ HackRF One #1 (120×75mm → 264×165px) ══ -->
  <rect x="310" y="83" width="264" height="165" rx="6" fill="#1a0d1a" stroke="#ef5350" stroke-width="2.5"/>
  <rect x="315" y="88" width="254" height="155" rx="4" fill="#1e1020" opacity="0.5"/>
  <!-- Main chips -->
  <rect x="325" y="105" width="55" height="45" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="352" y="126" fill="#9e9e9e" font-size="7" text-anchor="middle">MAX5864</text>
  <text x="352" y="137" fill="#757575" font-size="6" text-anchor="middle">ADC/DAC</text>
  <rect x="390" y="105" width="45" height="35" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="412" y="122" fill="#9e9e9e" font-size="7" text-anchor="middle">XC2C64A</text>
  <text x="412" y="132" fill="#757575" font-size="6" text-anchor="middle">CPLD</text>
  <rect x="445" y="105" width="45" height="35" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="467" y="122" fill="#9e9e9e" font-size="7" text-anchor="middle">LPC4320</text>
  <text x="467" y="132" fill="#757575" font-size="6" text-anchor="middle">MCU</text>
  <rect x="390" y="150" width="40" height="30" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="410" y="165" fill="#9e9e9e" font-size="7" text-anchor="middle">RFFC5072</text>
  <text x="410" y="175" fill="#757575" font-size="6" text-anchor="middle">Mixer</text>
  <!-- USB connector left side -->
  <rect x="310" y="128" width="12" height="20" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="316" y="141" fill="#90caf9" font-size="5" text-anchor="middle">USB</text>
  <!-- SMA connector right side -->
  <circle cx="565" cy="138" r="12" fill="#f57f17" stroke="#ffd600" stroke-width="2.5"/>
  <circle cx="565" cy="138" r="6" fill="#ffd600"/>
  <text x="565" y="160" fill="#ffd600" font-size="8" text-anchor="middle">SMA</text>
  <!-- LED indicators -->
  <circle cx="325" cy="220" r="4" fill="#4caf50"/>
  <circle cx="337" cy="220" r="4" fill="#ff5722"/>
  <circle cx="349" cy="220" r="4" fill="#2196f3"/>
  <text x="400" y="98" fill="#ef9a9a" font-size="11" text-anchor="middle" font-weight="bold">HackRF One #1</text>
  <text x="400" y="234" fill="#e57373" font-size="9" text-anchor="middle">RF Sweep 400–6000 MHz · 1MHz–6GHz</text>

  <!-- ══ HackRF One #2 (120×75mm) ══ -->
  <rect x="310" y="263" width="264" height="165" rx="6" fill="#1a0d1a" stroke="#ef5350" stroke-width="2.5"/>
  <rect x="315" y="268" width="254" height="155" rx="4" fill="#1e1020" opacity="0.5"/>
  <rect x="325" y="285" width="55" height="45" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="352" y="306" fill="#9e9e9e" font-size="7" text-anchor="middle">MAX5864</text>
  <text x="352" y="317" fill="#757575" font-size="6" text-anchor="middle">ADC/DAC</text>
  <rect x="390" y="285" width="45" height="35" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="412" y="302" fill="#9e9e9e" font-size="7" text-anchor="middle">XC2C64A</text>
  <text x="412" y="312" fill="#757575" font-size="6" text-anchor="middle">CPLD</text>
  <rect x="445" y="285" width="45" height="35" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="467" y="302" fill="#9e9e9e" font-size="7" text-anchor="middle">LPC4320</text>
  <text x="467" y="312" fill="#757575" font-size="6" text-anchor="middle">MCU</text>
  <rect x="390" y="330" width="40" height="30" rx="3" fill="#0d050d" stroke="#424242" stroke-width="1.5"/>
  <text x="410" y="345" fill="#9e9e9e" font-size="7" text-anchor="middle">RFFC5072</text>
  <text x="410" y="355" fill="#757575" font-size="6" text-anchor="middle">Mixer</text>
  <rect x="310" y="308" width="12" height="20" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="316" y="321" fill="#90caf9" font-size="5" text-anchor="middle">USB</text>
  <circle cx="565" cy="318" r="12" fill="#f57f17" stroke="#ffd600" stroke-width="2.5"/>
  <circle cx="565" cy="318" r="6" fill="#ffd600"/>
  <text x="565" y="340" fill="#ffd600" font-size="8" text-anchor="middle">SMA</text>
  <circle cx="325" cy="400" r="4" fill="#4caf50"/>
  <circle cx="337" cy="400" r="4" fill="#ff5722"/>
  <circle cx="349" cy="400" r="4" fill="#2196f3"/>
  <text x="400" y="278" fill="#ef9a9a" font-size="11" text-anchor="middle" font-weight="bold">HackRF One #2</text>
  <text x="400" y="414" fill="#e57373" font-size="9" text-anchor="middle">DroneID Decode 868 MHz</text>

  <!-- ══ CONNECTIONS ══ -->
  <!-- USB Pi → HackRF #1 -->
  <path d="M 290 95 L 310 95" stroke="#2196f3" stroke-width="2.5" stroke-linecap="round"/>
  <!-- USB Pi → HackRF #2 -->
  <path d="M 290 110 L 300 110 L 300 275 L 310 275" stroke="#2196f3" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,2"/>
  <!-- USB Pi → nRF52840 -->
  <path d="M 207 206 L 207 285" stroke="#2196f3" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,2"/>
  <!-- USB labels -->
  <text x="296" y="91" fill="#2196f3" font-size="8">USB</text>
  <text x="296" y="108" fill="#2196f3" font-size="8">USB</text>

  <!-- SMA → Antenna (up through top of box to antenna cap) -->
  <path d="M 565 126 L 610 126 L 610 55 L 400 55 L 400 65" stroke="#ffd600" stroke-width="2" stroke-linecap="round"/>
  <path d="M 565 306 L 617 306 L 617 48 L 395 48 L 395 65" stroke="#ffd600" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5,3"/>

  <!-- Antenna cap top -->
  <rect x="330" y="38" width="140" height="27" rx="8" fill="#1c3a1f" stroke="#00e676" stroke-width="2"/>
  <text x="400" y="56" fill="#00e676" font-size="10" text-anchor="middle" font-weight="bold">🔁 Omni антена 360° · 400–6000MHz</text>

  <!-- ══ SIZES TABLE ══ -->
  <rect x="90" y="450" width="540" height="200" rx="8" fill="#0d1520" stroke="#1a2940" stroke-width="1.5"/>
  <text x="360" y="472" fill="#4fc3f7" font-size="13" text-anchor="middle" font-weight="bold">РЕАЛНИ РАЗМЕРИ НА КОМПОНЕНТИТЕ</text>

  <!-- Table -->
  <line x1="100" y1="480" x2="620" y2="480" stroke="#1a2940" stroke-width="1"/>
  <!-- Headers -->
  <text x="200" y="495" fill="#546e7a" font-size="10" text-anchor="middle">Компонент</text>
  <text x="380" y="495" fill="#546e7a" font-size="10" text-anchor="middle">Реален размер</text>
  <text x="530" y="495" fill="#546e7a" font-size="10" text-anchor="middle">В кутията</text>
  <line x1="100" y1="500" x2="620" y2="500" stroke="#1a2940" stroke-width="1"/>

  <text x="200" y="516" fill="#66bb6a" font-size="10" text-anchor="middle">Raspberry Pi 5</text>
  <text x="380" y="516" fill="#90a4ae" font-size="10" text-anchor="middle">85 × 56 mm</text>
  <text x="530" y="516" fill="#4caf50" font-size="10" text-anchor="middle">горе-ляво</text>

  <text x="200" y="533" fill="#4db6ac" font-size="10" text-anchor="middle">NVMe HAT + SSD</text>
  <text x="380" y="533" fill="#90a4ae" font-size="10" text-anchor="middle">85 × 56 mm</text>
  <text x="530" y="533" fill="#4caf50" font-size="10" text-anchor="middle">стека под Pi</text>

  <text x="200" y="550" fill="#ef9a9a" font-size="10" text-anchor="middle">HackRF One #1</text>
  <text x="380" y="550" fill="#90a4ae" font-size="10" text-anchor="middle">120 × 75 mm</text>
  <text x="530" y="550" fill="#4caf50" font-size="10" text-anchor="middle">дясно горе</text>

  <text x="200" y="567" fill="#ef9a9a" font-size="10" text-anchor="middle">HackRF One #2</text>
  <text x="380" y="567" fill="#90a4ae" font-size="10" text-anchor="middle">120 × 75 mm</text>
  <text x="530" y="567" fill="#4caf50" font-size="10" text-anchor="middle">дясно долу</text>

  <text x="200" y="584" fill="#9fa8da" font-size="10" text-anchor="middle">nRF52840 dongle</text>
  <text x="380" y="584" fill="#90a4ae" font-size="10" text-anchor="middle">45 × 18 mm</text>
  <text x="530" y="584" fill="#4caf50" font-size="10" text-anchor="middle">в USB порт на Pi</text>

  <text x="200" y="601" fill="#7986cb" font-size="10" text-anchor="middle">PoE HAT</text>
  <text x="380" y="601" fill="#90a4ae" font-size="10" text-anchor="middle">85 × 56 mm</text>
  <text x="530" y="601" fill="#4caf50" font-size="10" text-anchor="middle">стека върху Pi</text>

  <line x1="100" y1="608" x2="620" y2="608" stroke="#1a2940" stroke-width="1"/>
  <text x="200" y="625" fill="#ffd600" font-size="11" text-anchor="middle" font-weight="bold">КУТИЯ (вътре)</text>
  <text x="380" y="625" fill="#ffd600" font-size="11" text-anchor="middle" font-weight="bold">240 × 160 × 90 mm</text>
  <text x="530" y="625" fill="#00e676" font-size="10" text-anchor="middle">✅ влиза в P1S</text>

  <line x1="100" y1="632" x2="620" y2="632" stroke="#1a2940" stroke-width="1"/>
  <text x="200" y="646" fill="#90a4ae" font-size="9" text-anchor="middle">+ антена капак</text>
  <text x="380" y="646" fill="#90a4ae" font-size="9" text-anchor="middle">+ 60 mm отгоре</text>
  <text x="530" y="646" fill="#90a4ae" font-size="9" text-anchor="middle">общо 90+60=150mm</text>

  <!-- LEGEND -->
  <rect x="90" y="665" width="540" height="40" rx="6" fill="#0d1520" stroke="#1a2940" stroke-width="1"/>
  <circle cx="115" cy="685" r="5" fill="#2196f3"/>
  <text x="125" y="689" fill="#2196f3" font-size="10">USB кабел</text>
  <circle cx="225" cy="685" r="5" fill="#ffd600"/>
  <text x="235" y="689" fill="#ffd600" font-size="10">SMA RF кабел</text>
  <circle cx="355" cy="685" r="5" fill="#00e676"/>
  <text x="365" y="689" fill="#00e676" font-size="10">Omni антена</text>
  <circle cx="470" cy="685" r="5" fill="#4caf50"/>
  <text x="480" y="689" fill="#4caf50" font-size="10">Захранване PoE</text>

  <!-- Note -->
  <text x="360" y="730" fill="#546e7a" font-size="10" text-anchor="middle">* HackRF One: 120×75mm реален размер от datasheet</text>
  <text x="360" y="745" fill="#546e7a" font-size="10" text-anchor="middle">* Pi 5: 85×56mm · PoE HAT и NVMe HAT са same footprint</text>
  <text x="360" y="760" fill="#546e7a" font-size="10" text-anchor="middle">* Bambu P1S: 256×256×256mm → кутията влиза без разделяне</text>

</svg>
</body>
</html>
