<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SkyGuard Box — Вътрешност</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060d1a; font-family: 'Courier New', monospace; }
svg { display:block; width:100%; max-width:700px; margin:0 auto; }
</style>
</head>
<body>
<svg viewBox="0 0 700 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="700" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="350" y="36" fill="#4fc3f7" font-size="18" text-anchor="middle" font-weight="bold" letter-spacing="2">SKYGUARD BOX — ВЪТРЕШНОСТ</text>
  <text x="350" y="55" fill="#546e7a" font-size="11" text-anchor="middle">ASA 3D печат · изглед отстрани · разрез</text>

  <!-- OUTER BOX (plastic, 3D printed) -->
  <!-- Body -->
  <rect x="180" y="70" width="320" height="730" rx="18" fill="#111820" stroke="#37474f" stroke-width="3"/>
  <!-- Plastic texture dots -->
  <g fill="#1a2535" opacity="0.6">
    <rect x="185" y="75" width="2" height="2" rx="1"/>
    <rect x="193" y="75" width="2" height="2" rx="1"/>
    <rect x="201" y="75" width="2" height="2" rx="1"/>
    <rect x="485" y="75" width="2" height="2" rx="1"/>
    <rect x="493" y="75" width="2" height="2" rx="1"/>
  </g>
  <!-- Top plastic radome cap -->
  <rect x="180" y="70" width="320" height="110" rx="18" fill="#1c2a3a" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="96" fill="#4fc3f7" font-size="10" text-anchor="middle" letter-spacing="1">ПЛАСТМАСОВ КАПАК (RF прозрачен)</text>

  <!-- OMNI ANTENNA inside top cap -->
  <!-- Base -->
  <rect x="325" y="108" width="30" height="8" rx="3" fill="#607d8b"/>
  <!-- Antenna body -->
  <rect x="336" y="72" width="8" height="38" rx="3" fill="#b0bec5" filter="url(#glow)"/>
  <!-- Antenna tip -->
  <polygon points="340,66 337,74 343,74" fill="#eceff1"/>
  <!-- Coil detail -->
  <rect x="334" y="78" width="12" height="4" rx="2" fill="#90a4ae" opacity="0.7"/>
  <rect x="334" y="85" width="12" height="4" rx="2" fill="#90a4ae" opacity="0.7"/>
  <rect x="334" y="92" width="12" height="4" rx="2" fill="#90a4ae" opacity="0.7"/>
  <!-- 360 waves -->
  <path d="M 300 95 Q 280 85 300 75" stroke="#00e676" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 290 95 Q 265 82 290 70" stroke="#00e676" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 380 95 Q 400 85 380 75" stroke="#00e676" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 390 95 Q 415 82 390 70" stroke="#00e676" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Label: Omni antenna -->
  <line x1="344" y1="70" x2="530" y2="55" stroke="#00e676" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="534" y="52" fill="#00e676" font-size="11" font-weight="bold">Omni антена</text>
  <text x="534" y="65" fill="#4caf50" font-size="9">400–6000 MHz · 360°</text>
  <text x="534" y="78" fill="#4caf50" font-size="9">скрита в пластмасата</text>

  <!-- SMA cable from antenna down -->
  <line x1="340" y1="116" x2="340" y2="310" stroke="#ffd600" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ═══ RASPBERRY PI 5 ═══ -->
  <rect x="195" y="185" width="290" height="100" rx="6" fill="#1b3a1f" stroke="#4caf50" stroke-width="2"/>
  <!-- PCB texture -->
  <rect x="200" y="190" width="280" height="90" rx="4" fill="#1e421f" opacity="0.5"/>
  <!-- CPU chip -->
  <rect x="230" y="210" width="55" height="55" rx="4" fill="#0d2010" stroke="#388e3c" stroke-width="1.5"/>
  <text x="257" y="241" fill="#81c784" font-size="8" text-anchor="middle">BCM2712</text>
  <text x="257" y="252" fill="#4caf50" font-size="7" text-anchor="middle">CPU</text>
  <!-- RAM chip -->
  <rect x="298" y="215" width="40" height="25" rx="2" fill="#0d2010" stroke="#388e3c" stroke-width="1"/>
  <text x="318" y="231" fill="#81c784" font-size="7" text-anchor="middle">16GB</text>
  <text x="318" y="240" fill="#4caf50" font-size="6" text-anchor="middle">LPDDR4X</text>
  <!-- USB ports on right -->
  <rect x="448" y="200" width="22" height="12" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1"/>
  <rect x="448" y="216" width="22" height="12" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1"/>
  <rect x="448" y="232" width="22" height="12" rx="2" fill="#0d47a1" stroke="#1976d2" stroke-width="1"/>
  <text x="459" y="258" fill="#42a5f5" font-size="7" text-anchor="middle">USB3</text>
  <!-- Ethernet -->
  <rect x="448" y="250" width="22" height="18" rx="2" fill="#1a237e" stroke="#3f51b5" stroke-width="1"/>
  <text x="459" y="262" fill="#9fa8da" font-size="6" text-anchor="middle">ETH</text>
  <!-- WiFi antenna lines (built-in) -->
  <text x="350" y="275" fill="#a5d6a7" font-size="8" text-anchor="middle">WiFi 5GHz · BT · GPIO · built-in</text>

  <!-- Label Pi -->
  <line x1="193" y1="235" x2="140" y2="235" stroke="#4caf50" stroke-width="1"/>
  <text x="135" y="224" fill="#66bb6a" font-size="12" text-anchor="end" font-weight="bold">Raspberry</text>
  <text x="135" y="238" fill="#66bb6a" font-size="12" text-anchor="end" font-weight="bold">Pi 5</text>
  <text x="135" y="252" fill="#388e3c" font-size="9" text-anchor="end">16GB RAM</text>

  <!-- Pi title inside -->
  <text x="340" y="200" fill="#81c784" font-size="11" text-anchor="middle" font-weight="bold">RASPBERRY Pi 5</text>

  <!-- USB cable Pi → HackRF #1 -->
  <path d="M 459 228 L 475 228 L 475 340 L 459 340" stroke="#2196f3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="480" y="287" fill="#2196f3" font-size="9">USB 3.0</text>

  <!-- USB cable Pi → HackRF #2 -->
  <path d="M 459 220 L 482 220 L 482 450 L 459 450" stroke="#2196f3" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="5,2"/>

  <!-- ═══ HackRF One #1 ═══ -->
  <rect x="195" y="300" width="290" height="95" rx="6" fill="#1a1a2e" stroke="#ef5350" stroke-width="2"/>
  <rect x="200" y="305" width="280" height="85" rx="4" fill="#212121" opacity="0.6"/>
  <!-- HackRF chips -->
  <rect x="220" y="320" width="45" height="45" rx="3" fill="#0d0d1a" stroke="#424242" stroke-width="1.5"/>
  <text x="242" y="345" fill="#9e9e9e" font-size="7" text-anchor="middle">MAX5864</text>
  <rect x="275" y="320" width="40" height="30" rx="3" fill="#0d0d1a" stroke="#424242" stroke-width="1.5"/>
  <text x="295" y="338" fill="#9e9e9e" font-size="7" text-anchor="middle">CPLD</text>
  <rect x="325" y="320" width="35" height="30" rx="3" fill="#0d0d1a" stroke="#424242" stroke-width="1.5"/>
  <text x="342" y="338" fill="#9e9e9e" font-size="7" text-anchor="middle">LPC43</text>
  <!-- SMA connector -->
  <rect x="450" y="328" width="18" height="18" rx="2" fill="#f57f17" stroke="#ffd600" stroke-width="2"/>
  <circle cx="459" cy="337" r="5" fill="#ffd600"/>
  <text x="459" y="370" fill="#ffd600" font-size="8" text-anchor="middle">SMA</text>
  <!-- Title -->
  <text x="340" y="315" fill="#ef9a9a" font-size="10" text-anchor="middle" font-weight="bold">HackRF One #1 — RF Sweep 400–6000 MHz</text>
  <!-- Label -->
  <line x1="193" y1="347" x2="140" y2="347" stroke="#ef5350" stroke-width="1"/>
  <text x="135" y="340" fill="#ef5350" font-size="11" text-anchor="end" font-weight="bold">HackRF</text>
  <text x="135" y="354" fill="#ef5350" font-size="11" text-anchor="end" font-weight="bold">One #1</text>
  <text x="135" y="367" fill="#b71c1c" font-size="8" text-anchor="end">SDR · 1MHz–6GHz</text>

  <!-- SMA cable HackRF1 → up to antenna split -->
  <path d="M 459 328 L 475 328 L 475 155 L 460 155 L 340 155 L 340 116" stroke="#ffd600" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ═══ HackRF One #2 ═══ -->
  <rect x="195" y="410" width="290" height="95" rx="6" fill="#1a1a2e" stroke="#ef5350" stroke-width="2"/>
  <rect x="200" y="415" width="280" height="85" rx="4" fill="#212121" opacity="0.6"/>
  <rect x="220" y="430" width="45" height="45" rx="3" fill="#0d0d1a" stroke="#424242" stroke-width="1.5"/>
  <text x="242" y="455" fill="#9e9e9e" font-size="7" text-anchor="middle">MAX5864</text>
  <rect x="275" y="430" width="40" height="30" rx="3" fill="#0d0d1a" stroke="#424242" stroke-width="1.5"/>
  <text x="295" y="448" fill="#9e9e9e" font-size="7" text-anchor="middle">CPLD</text>
  <rect x="325" y="430" width="35" height="30" rx="3" fill="#0d0d1a" stroke="#424242" stroke-width="1.5"/>
  <text x="342" y="448" fill="#9e9e9e" font-size="7" text-anchor="middle">LPC43</text>
  <rect x="450" y="438" width="18" height="18" rx="2" fill="#f57f17" stroke="#ffd600" stroke-width="2"/>
  <circle cx="459" cy="447" r="5" fill="#ffd600"/>
  <text x="459" y="478" fill="#ffd600" font-size="8" text-anchor="middle">SMA</text>
  <text x="340" y="425" fill="#ef9a9a" font-size="10" text-anchor="middle" font-weight="bold">HackRF One #2 — DroneID 868 MHz</text>
  <line x1="193" y1="457" x2="140" y2="457" stroke="#ef5350" stroke-width="1"/>
  <text x="135" y="450" fill="#ef5350" font-size="11" text-anchor="end" font-weight="bold">HackRF</text>
  <text x="135" y="464" fill="#ef5350" font-size="11" text-anchor="end" font-weight="bold">One #2</text>
  <text x="135" y="477" fill="#b71c1c" font-size="8" text-anchor="end">DroneID decode</text>

  <!-- SMA cable HackRF2 → up to antenna -->
  <path d="M 459 438 L 482 438 L 482 148 L 345 148 L 345 116" stroke="#ffd600" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>

  <!-- ═══ nRF52840 USB dongle ═══ -->
  <rect x="195" y="520" width="160" height="55" rx="5" fill="#0d1b3e" stroke="#3f51b5" stroke-width="2"/>
  <rect x="200" y="525" width="70" height="12" rx="2" fill="#1565c0" stroke="#42a5f5" stroke-width="1"/>
  <text x="235" y="535" fill="#90caf9" font-size="7" text-anchor="middle">USB</text>
  <!-- PCB -->
  <rect x="210" y="540" width="130" height="28" rx="3" fill="#0a1628" stroke="#283593" stroke-width="1"/>
  <rect x="285" y="545" width="30" height="18" rx="2" fill="#0d1b3e" stroke="#3f51b5" stroke-width="1"/>
  <text x="300" y="557" fill="#7986cb" font-size="6" text-anchor="middle">nRF52840</text>
  <!-- BLE antenna line on PCB -->
  <path d="M 215 550 Q 225 545 235 550 Q 245 555 255 550" stroke="#5c6bc0" stroke-width="1.5" fill="none"/>
  <text x="340" y="535" fill="#7986cb" font-size="10" text-anchor="middle" font-weight="bold">nRF52840 BLE</text>
  <text x="340" y="549" fill="#3f51b5" font-size="8" text-anchor="middle">Remote ID · Bluetooth 5</text>
  <text x="340" y="563" fill="#3f51b5" font-size="8" text-anchor="middle">USB dongle → Pi USB порт</text>
  <line x1="193" y1="547" x2="140" y2="547" stroke="#3f51b5" stroke-width="1"/>
  <text x="135" y="545" fill="#5c6bc0" font-size="11" text-anchor="end" font-weight="bold">nRF52840</text>
  <text x="135" y="559" fill="#3f51b5" font-size="8" text-anchor="end">BLE dongle</text>

  <!-- USB cable nRF → Pi -->
  <path d="M 355 520 L 355 285" stroke="#2196f3" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- ═══ NVMe HAT + SSD ═══ -->
  <rect x="195" y="590" width="290" height="80" rx="5" fill="#00251a" stroke="#00897b" stroke-width="2"/>
  <!-- HAT PCB -->
  <rect x="200" y="595" width="220" height="70" rx="4" fill="#003d33" opacity="0.7"/>
  <!-- M.2 SSD stick -->
  <rect x="210" y="610" width="130" height="25" rx="3" fill="#001f1a" stroke="#004d40" stroke-width="1.5"/>
  <rect x="212" y="612" width="126" height="21" rx="2" fill="#00332b"/>
  <!-- SSD chips -->
  <rect x="220" y="614" width="20" height="17" rx="1" fill="#004d40" stroke="#00695c" stroke-width="1"/>
  <rect x="245" y="614" width="20" height="17" rx="1" fill="#004d40" stroke="#00695c" stroke-width="1"/>
  <rect x="270" y="614" width="20" height="17" rx="1" fill="#004d40" stroke="#00695c" stroke-width="1"/>
  <rect x="295" y="614" width="20" height="17" rx="1" fill="#00695c" stroke="#00897b" stroke-width="1"/>
  <text x="305" y="627" fill="#80cbc4" font-size="6" text-anchor="middle">CTRL</text>
  <text x="340" y="608" fill="#4db6ac" font-size="10" text-anchor="middle" font-weight="bold">NVMe M.2 HAT + SSD 512GB</text>
  <text x="340" y="650" fill="#00897b" font-size="8" text-anchor="middle">PCIe 3.0 → Pi 5 · логове · RF dataset</text>
  <line x1="193" y1="630" x2="140" y2="630" stroke="#00897b" stroke-width="1"/>
  <text x="135" y="624" fill="#26a69a" font-size="11" text-anchor="end" font-weight="bold">NVMe</text>
  <text x="135" y="638" fill="#00897b" font-size="8" text-anchor="end">HAT + SSD</text>

  <!-- ═══ PoE Power Board ═══ -->
  <rect x="195" y="685" width="290" height="100" rx="5" fill="#0d1240" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="200" y="690" width="280" height="90" rx="4" fill="#131a52" opacity="0.5"/>
  <!-- RJ45 -->
  <rect x="415" y="715" width="50" height="35" rx="3" fill="#0d47a1" stroke="#42a5f5" stroke-width="2"/>
  <text x="440" y="736" fill="#90caf9" font-size="8" text-anchor="middle">PoE IN</text>
  <text x="440" y="747" fill="#1976d2" font-size="7" text-anchor="middle">802.3at</text>
  <!-- Capacitors -->
  <rect x="215" y="705" width="10" height="25" rx="2" fill="#1a237e" stroke="#3f51b5" stroke-width="1"/>
  <rect x="232" y="705" width="10" height="25" rx="2" fill="#1a237e" stroke="#3f51b5" stroke-width="1"/>
  <rect x="249" y="705" width="10" height="25" rx="2" fill="#1a237e" stroke="#3f51b5" stroke-width="1"/>
  <!-- Voltage regulators -->
  <rect x="280" y="705" width="35" height="20" rx="2" fill="#0d1b3e" stroke="#283593" stroke-width="1"/>
  <text x="297" y="718" fill="#5c6bc0" font-size="7" text-anchor="middle">5V reg</text>
  <rect x="325" y="705" width="35" height="20" rx="2" fill="#0d1b3e" stroke="#283593" stroke-width="1"/>
  <text x="342" y="718" fill="#5c6bc0" font-size="7" text-anchor="middle">12V reg</text>
  <!-- Ethernet cable going out bottom -->
  <rect x="420" y="785" width="40" height="15" rx="2" fill="#0d47a1" stroke="#42a5f5" stroke-width="1"/>
  <line x1="440" y1="800" x2="440" y2="818" stroke="#42a5f5" stroke-width="3"/>
  <text x="440" y="830" fill="#42a5f5" font-size="9" text-anchor="middle">Ethernet кабел</text>

  <text x="300" y="708" fill="#7986cb" font-size="11" text-anchor="middle" font-weight="bold">PoE Power Board</text>
  <text x="300" y="750" fill="#5c6bc0" font-size="8" text-anchor="middle">5V → Pi 5 · 5V → HackRF ×2 · 3.3V → BLE</text>
  <line x1="193" y1="735" x2="140" y2="735" stroke="#5c6bc0" stroke-width="1"/>
  <text x="135" y="729" fill="#7986cb" font-size="11" text-anchor="end" font-weight="bold">PoE Board</text>
  <text x="135" y="743" fill="#5c6bc0" font-size="8" text-anchor="end">802.3at input</text>

  <!-- POWER lines going up -->
  <line x1="210" y1="685" x2="210" y2="290" stroke="#f44336" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="205" y="310" fill="#f44336" font-size="8" transform="rotate(-90 205 310)">5V захранване</text>

  <!-- Mounting holes -->
  <circle cx="195" cy="80" r="6" fill="none" stroke="#37474f" stroke-width="1.5"/>
  <circle cx="485" cy="80" r="6" fill="none" stroke="#37474f" stroke-width="1.5"/>
  <circle cx="195" cy="790" r="6" fill="none" stroke="#37474f" stroke-width="1.5"/>
  <circle cx="485" cy="790" r="6" fill="none" stroke="#37474f" stroke-width="1.5"/>

  <!-- Dimension -->
  <line x1="185" y1="75" x2="185" y2="795" stroke="#546e7a" stroke-width="1"/>
  <text x="175" y="440" fill="#546e7a" font-size="10" text-anchor="middle" transform="rotate(-90 175 440)">~230 mm височина</text>
  <line x1="185" y1="75" x2="495" y2="75" stroke="#546e7a" stroke-width="1"/>
  <text x="340" y="68" fill="#546e7a" font-size="10" text-anchor="middle">~220 mm ширина</text>

  <!-- Legend -->
  <rect x="30" y="845" width="640" height="45" rx="6" fill="#0d1b2e" stroke="#1a2940" stroke-width="1"/>
  <circle cx="55" cy="868" r="5" fill="#ffd600"/>
  <text x="65" y="872" fill="#ffd600" font-size="10">SMA RF кабел</text>
  <circle cx="170" cy="868" r="5" fill="#2196f3"/>
  <text x="180" y="872" fill="#2196f3" font-size="10">USB кабел</text>
  <circle cx="270" cy="868" r="5" fill="#f44336"/>
  <text x="280" y="872" fill="#f44336" font-size="10">Захранване</text>
  <circle cx="375" cy="868" r="5" fill="#00e676"/>
  <text x="385" y="872" fill="#00e676" font-size="10">Антена 360°</text>
  <circle cx="480" cy="868" r="5" fill="#37474f"/>
  <text x="490" y="872" fill="#90a4ae" font-size="10">Монтажни отвори</text>
</svg>
</body>
</html>
