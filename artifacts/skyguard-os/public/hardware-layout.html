<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuard Box — Вътрешна подредба</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1e; font-family: 'Courier New', monospace; color: #fff; padding: 20px; }
  h1 { text-align: center; color: #4fc3f7; margin-bottom: 8px; font-size: 18px; letter-spacing: 2px; }
  p.sub { text-align: center; color: #546e7a; font-size: 12px; margin-bottom: 20px; }
  .diagram-wrap { display: flex; justify-content: center; }
  svg text { font-family: 'Courier New', monospace; }
  .legend { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #90a4ae; }
  .dot { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>

<h1>⬡ SKYGUARD BOX — ВЪТРЕШНА СХЕМА</h1>
<p class="sub">Изглед отгоре · 220 × 200 mm · Bambu P1S ASA печат</p>

<div class="diagram-wrap">
<svg width="520" height="520" viewBox="0 0 520 520">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background grid -->
  <rect width="520" height="520" fill="#0d1b2e" rx="12"/>
  <g stroke="#1a2940" stroke-width="1">
    <line x1="0" y1="20" x2="520" y2="20"/>
    <line x1="0" y1="40" x2="520" y2="40"/>
    <line x1="0" y1="60" x2="520" y2="60"/>
    <line x1="0" y1="80" x2="520" y2="80"/>
    <line x1="0" y1="100" x2="520" y2="100"/>
    <line x1="0" y1="120" x2="520" y2="120"/>
    <line x1="0" y1="140" x2="520" y2="140"/>
    <line x1="0" y1="160" x2="520" y2="160"/>
    <line x1="0" y1="180" x2="520" y2="180"/>
    <line x1="0" y1="200" x2="520" y2="200"/>
    <line x1="0" y1="220" x2="520" y2="220"/>
    <line x1="0" y1="240" x2="520" y2="240"/>
    <line x1="0" y1="260" x2="520" y2="260"/>
    <line x1="0" y1="280" x2="520" y2="280"/>
    <line x1="0" y1="300" x2="520" y2="300"/>
    <line x1="0" y1="320" x2="520" y2="320"/>
    <line x1="0" y1="340" x2="520" y2="340"/>
    <line x1="0" y1="360" x2="520" y2="360"/>
    <line x1="0" y1="380" x2="520" y2="380"/>
    <line x1="0" y1="400" x2="520" y2="400"/>
    <line x1="0" y1="420" x2="520" y2="420"/>
    <line x1="0" y1="440" x2="520" y2="440"/>
    <line x1="0" y1="460" x2="520" y2="460"/>
    <line x1="0" y1="480" x2="520" y2="480"/>
    <line x1="0" y1="500" x2="520" y2="500"/>
    <line x1="20" y1="0" x2="20" y2="520"/>
    <line x1="40" y1="0" x2="40" y2="520"/>
    <line x1="60" y1="0" x2="60" y2="520"/>
    <line x1="80" y1="0" x2="80" y2="520"/>
    <line x1="100" y1="0" x2="100" y2="520"/>
    <line x1="120" y1="0" x2="120" y2="520"/>
    <line x1="140" y1="0" x2="140" y2="520"/>
    <line x1="160" y1="0" x2="160" y2="520"/>
    <line x1="180" y1="0" x2="180" y2="520"/>
    <line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="220" y1="0" x2="220" y2="520"/>
    <line x1="240" y1="0" x2="240" y2="520"/>
    <line x1="260" y1="0" x2="260" y2="520"/>
    <line x1="280" y1="0" x2="280" y2="520"/>
    <line x1="300" y1="0" x2="300" y2="520"/>
    <line x1="320" y1="0" x2="320" y2="520"/>
    <line x1="340" y1="0" x2="340" y2="520"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="380" y1="0" x2="380" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="420" y1="0" x2="420" y2="520"/>
    <line x1="440" y1="0" x2="440" y2="520"/>
    <line x1="460" y1="0" x2="460" y2="520"/>
    <line x1="480" y1="0" x2="480" y2="520"/>
    <line x1="500" y1="0" x2="500" y2="520"/>
  </g>

  <!-- Enclosure border -->
  <rect x="20" y="20" width="480" height="480" fill="none" stroke="#4fc3f7" stroke-width="2.5" rx="8" stroke-dasharray="8,4"/>

  <!-- Dimension lines -->
  <line x1="25" y1="14" x2="495" y2="14" stroke="#546e7a" stroke-width="1"/>
  <text x="260" y="11" fill="#546e7a" font-size="10" text-anchor="middle">220 mm</text>
  <line x1="14" y1="25" x2="14" y2="495" stroke="#546e7a" stroke-width="1"/>
  <text x="10" y="265" fill="#546e7a" font-size="10" text-anchor="middle" transform="rotate(-90,10,265)">200 mm</text>

  <!-- USB cables Pi → HackRF #1 -->
  <polyline points="175,90 230,90 230,140" fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linecap="round"/>
  <text x="198" y="84" fill="#2196F3" font-size="9">USB</text>

  <!-- USB cables Pi → HackRF #2 -->
  <polyline points="175,110 235,110 235,270" fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linecap="round"/>
  <text x="198" y="124" fill="#2196F3" font-size="9">USB</text>

  <!-- USB cable Pi → BLE -->
  <polyline points="130,40 130,32 240,32 240,50" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- SMA RF cables HackRF#1 → right wall -->
  <polyline points="430,160 470,160" fill="none" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round"/>
  <text x="435" y="155" fill="#FFD600" font-size="9">SMA</text>

  <!-- SMA RF cables HackRF#2 → right wall -->
  <polyline points="430,290 470,290" fill="none" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round"/>
  <text x="435" y="285" fill="#FFD600" font-size="9">SMA</text>

  <!-- Power lines -->
  <line x1="130" y1="185" x2="130" y2="390" stroke="#f44336" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="280" y1="380" x2="280" y2="390" stroke="#f44336" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Antenna symbol right wall -->
  <rect x="474" y="130" width="22" height="180" fill="#1a3a2a" stroke="#00e676" stroke-width="1.5" rx="4"/>
  <text x="485" y="185" fill="#00e676" font-size="8" text-anchor="middle" transform="rotate(90,485,220)">АНТЕНА omni 360°</text>
  <circle cx="485" cy="145" r="4" fill="#00e676" opacity="0.8"/>
  <circle cx="485" cy="230" r="4" fill="#00e676" opacity="0.8"/>
  <circle cx="485" cy="300" r="4" fill="#00e676" opacity="0.5"/>

  <!-- Raspberry Pi 5 -->
  <rect x="30" y="40" width="148" height="140" fill="#1b5e20" stroke="#66bb6a" stroke-width="2" rx="6" filter="url(#glow)"/>
  <rect x="34" y="44" width="140" height="132" fill="#2e7d32" rx="4" opacity="0.4"/>
  <!-- Pi chip -->
  <rect x="70" y="80" width="40" height="40" fill="#1b5e20" stroke="#a5d6a7" stroke-width="1" rx="2"/>
  <text x="90" y="105" fill="#a5d6a7" font-size="7" text-anchor="middle">CPU</text>
  <!-- Pi USB ports -->
  <rect x="152" y="55" width="18" height="10" fill="#424242" rx="1"/>
  <rect x="152" y="70" width="18" height="10" fill="#1565c0" rx="1"/>
  <rect x="152" y="85" width="18" height="10" fill="#1565c0" rx="1"/>
  <rect x="152" y="100" width="18" height="10" fill="#37474f" rx="1"/>
  <text x="104" y="58" fill="#a5d6a7" font-size="11" text-anchor="middle" font-weight="bold">Raspberry Pi 5</text>
  <text x="104" y="72" fill="#81c784" font-size="9" text-anchor="middle">85 × 56 mm</text>
  <text x="104" y="155" fill="#4caf50" font-size="8" text-anchor="middle">16GB RAM</text>

  <!-- NVMe HAT + SSD -->
  <rect x="30" y="195" width="148" height="90" fill="#004d40" stroke="#26a69a" stroke-width="2" rx="6"/>
  <rect x="50" y="215" width="108" height="25" fill="#00695c" stroke="#80cbc4" stroke-width="1" rx="3"/>
  <text x="104" y="232" fill="#80cbc4" font-size="8" text-anchor="middle">Samsung NVMe SSD</text>
  <text x="104" y="213" fill="#4db6ac" font-size="11" text-anchor="middle" font-weight="bold">NVMe HAT + SSD</text>
  <text x="104" y="270" fill="#26a69a" font-size="9" text-anchor="middle">85 × 40 mm · 512GB</text>

  <!-- nRF52840 BLE -->
  <rect x="210" y="30" width="90" height="38" fill="#1a237e" stroke="#7986cb" stroke-width="2" rx="5"/>
  <text x="255" y="47" fill="#9fa8da" font-size="10" text-anchor="middle" font-weight="bold">nRF52840</text>
  <text x="255" y="61" fill="#7986cb" font-size="8" text-anchor="middle">BLE Remote ID</text>

  <!-- HackRF One #1 -->
  <rect x="210" y="95" width="220" height="130" fill="#1a1a2e" stroke="#ef5350" stroke-width="2" rx="6" filter="url(#glow)"/>
  <rect x="214" y="99" width="212" height="122" fill="#212121" rx="4" opacity="0.5"/>
  <!-- HackRF chip details -->
  <rect x="240" y="120" width="50" height="35" fill="#1a1a1a" stroke="#616161" stroke-width="1" rx="2"/>
  <rect x="300" y="120" width="35" height="35" fill="#1a1a1a" stroke="#616161" stroke-width="1" rx="2"/>
  <text x="320" y="152" fill="#616161" font-size="6" text-anchor="middle">CPLD</text>
  <text x="320" y="108" fill="#ef9a9a" font-size="11" text-anchor="middle" font-weight="bold">HackRF One #1</text>
  <text x="320" y="121" fill="#e57373" font-size="8" text-anchor="middle">RF Sweep 400–6000 MHz</text>
  <text x="320" y="205" fill="#b71c1c" font-size="9" text-anchor="middle">120 × 75 mm</text>
  <!-- SMA connector -->
  <circle cx="428" cy="160" r="8" fill="#FFD600" stroke="#F57F17" stroke-width="1.5"/>
  <text x="428" y="163" fill="#212121" font-size="7" text-anchor="middle" font-weight="bold">SMA</text>

  <!-- HackRF One #2 -->
  <rect x="210" y="250" width="220" height="130" fill="#1a1a2e" stroke="#ef5350" stroke-width="2" rx="6" filter="url(#glow)"/>
  <rect x="214" y="254" width="212" height="122" fill="#212121" rx="4" opacity="0.5"/>
  <rect x="240" y="275" width="50" height="35" fill="#1a1a1a" stroke="#616161" stroke-width="1" rx="2"/>
  <rect x="300" y="275" width="35" height="35" fill="#1a1a1a" stroke="#616161" stroke-width="1" rx="2"/>
  <text x="320" y="307" fill="#616161" font-size="6" text-anchor="middle">CPLD</text>
  <text x="320" y="263" fill="#ef9a9a" font-size="11" text-anchor="middle" font-weight="bold">HackRF One #2</text>
  <text x="320" y="276" fill="#e57373" font-size="8" text-anchor="middle">DroneID 868 MHz</text>
  <text x="320" y="360" fill="#b71c1c" font-size="9" text-anchor="middle">120 × 75 mm</text>
  <circle cx="428" cy="315" r="8" fill="#FFD600" stroke="#F57F17" stroke-width="1.5"/>
  <text x="428" y="318" fill="#212121" font-size="7" text-anchor="middle" font-weight="bold">SMA</text>

  <!-- PoE Power Board -->
  <rect x="30" y="400" width="430" height="90" fill="#1a237e" stroke="#5c6bc0" stroke-width="2" rx="6"/>
  <rect x="34" y="404" width="422" height="82" fill="#283593" rx="4" opacity="0.4"/>
  <text x="245" y="430" fill="#9fa8da" font-size="13" text-anchor="middle" font-weight="bold">PoE Power Board</text>
  <text x="245" y="448" fill="#7986cb" font-size="9" text-anchor="middle">5V · 12V изходи · IEEE 802.3at/bt</text>
  <!-- RJ45 -->
  <rect x="380" y="455" width="55" height="30" fill="#0d47a1" stroke="#42a5f5" stroke-width="1.5" rx="3"/>
  <text x="407" y="474" fill="#90caf9" font-size="8" text-anchor="middle">PoE IN</text>
  <!-- Power output arrows -->
  <text x="100" y="465" fill="#5c6bc0" font-size="8">→ 5V Pi · 5V HackRF · 3.3V BLE</text>
  <!-- Ethernet port indication -->
  <rect x="225" y="488" width="40" height="8" fill="#1565c0" rx="2"/>
  <line x1="245" y1="496" x2="245" y2="510" stroke="#42a5f5" stroke-width="2"/>
  <text x="245" y="518" fill="#42a5f5" font-size="9" text-anchor="middle">Ethernet кабел</text>

  <!-- Corner mounting holes -->
  <circle cx="38" cy="38" r="5" fill="none" stroke="#546e7a" stroke-width="1.5"/>
  <circle cx="482" cy="38" r="5" fill="none" stroke="#546e7a" stroke-width="1.5"/>
  <circle cx="38" cy="482" r="5" fill="none" stroke="#546e7a" stroke-width="1.5"/>
  <circle cx="482" cy="482" r="5" fill="none" stroke="#546e7a" stroke-width="1.5"/>

</svg>
</div>

<div class="legend">
  <div class="leg"><div class="dot" style="background:#2196F3"></div> USB кабели</div>
  <div class="leg"><div class="dot" style="background:#FFD600"></div> SMA RF кабели</div>
  <div class="leg"><div class="dot" style="background:#f44336"></div> Захранване</div>
  <div class="leg"><div class="dot" style="background:#00e676"></div> Антена (omni 360°)</div>
</div>

</body>
</html>
